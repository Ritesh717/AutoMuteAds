name: Auto-Tag and Version Bump on Master Push
run-name: Auto-Tag - ${{ github.event.head_commit.message }}

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  tag-and-bump:
    name: Version Bump and Tag
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.author.name, 'github-actions')"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine Bump Type
        id: bump-type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" == *"#major"* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" == *"#minor"* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump package.json Version
        id: bump-version
        run: |
          npm version ${{ steps.bump-type.outputs.type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          while git rev-parse "v$NEW_VERSION" >/dev/null 2>&1 || git ls-remote --tags origin "refs/tags/v$NEW_VERSION" | grep -q "refs/tags/v$NEW_VERSION"; do
            echo "Tag v$NEW_VERSION already exists. Auto-incrementing version..."
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
          done
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push Version Bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${{ steps.bump-version.outputs.version }} [skip ci]"
          git push origin master

      - name: Create and Push Git Tag
        run: |
          git tag "v${{ steps.bump-version.outputs.version }}"
          git push origin "v${{ steps.bump-version.outputs.version }}"

      - name: Create Job Summary
        run: |
          echo "## 🏷️ New Release Tag Generated" >> $GITHUB_STEP_SUMMARY
          echo "A new version has been successfully created and tagged!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **New Version Tag** | \`v${{ steps.bump-version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bump Type** | \`${{ steps.bump-type.outputs.type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit Message** | \`${{ github.event.head_commit.message }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This tag has automatically triggered the **Build and Publish** workflow to compile and upload version \`v${{ steps.bump-version.outputs.version }}\` to the Chrome Web Store." >> $GITHUB_STEP_SUMMARY

