name: Build and Publish to Chrome Web Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Extension
        run: npm run build

      - name: Package Extension (Zip)
        run: |
          cd dist
          zip -r ../automute-ads-release.zip *
          cd ..

      - name: Upload Packaged Zip as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-release-zip
          path: automute-ads-release.zip
          retention-days: 7

  publish:
    name: Publish to Web Store
    needs: build
    runs-on: ubuntu-latest
    environment: Production  # Enforces manual approval in GitHub Settings > Environments

    steps:
      - name: Download Packaged Zip Artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-release-zip

      - name: Upload and Publish to Chrome Web Store
        run: |
          npx -y chrome-webstore-upload-cli --source automute-ads-release.zip --extension-id "${{ secrets.EXTENSION_ID }}"
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          PUBLISHER_ID: ${{ secrets.PUBLISHER_ID }}

      - name: Create Publish Summary
        run: |
          echo "## 🚀 Chrome Web Store Publish Status" >> $GITHUB_STEP_SUMMARY
          echo "The extension has been successfully built and pushed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Published Version** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | Approved & Uploaded |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit Message** | \`${{ github.event.head_commit.message }}\` |" >> $GITHUB_STEP_SUMMARY

